<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Feedback MVP — AI Feedback Analysis</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">

<style>

*,
*::before,
*::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --bg: #ffffff;
  --text-primary: #111111;
  --text-secondary: #666666;
  --text-tertiary: #999999;

  --border: #eeeeee;

  --card: #fafafa;
  --card-hover: #f5f5f5;

  --accent: #111111;
  --accent-hover: #333333;

  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;

  --shadow-xs: 0 1px 3px rgba(0,0,0,0.04);
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 20px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.10);

  --transition: 0.18s cubic-bezier(0.4, 0, 0.2, 1);
}

html {
  font-size: 16px;
  scroll-behavior: smooth;
  -webkit-font-smoothing: antialiased;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text-primary);
  line-height: 1.6;
}

/* ───────────────── NAV ───────────────── */

nav {
  position: sticky;
  top: 0;
  z-index: 100;

  display: flex;
  align-items: center;
  justify-content: space-between;

  height: 60px;

  padding: 0 40px;

  background: rgba(255,255,255,0.92);

  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);

  border-bottom: 1px solid var(--border);
}

.nav-brand {
  text-decoration: none;
  color: var(--text-primary);

  font-size: 15px;
  font-weight: 600;
}

.nav-brand span {
  color: var(--text-tertiary);
  font-weight: 300;
}

.nav-example-btn {
  border: 1px solid var(--border);
  background: transparent;

  padding: 6px 14px;

  border-radius: var(--radius-sm);

  font-size: 13px;
  font-family: inherit;

  cursor: pointer;

  transition: all var(--transition);
}

.nav-example-btn:hover {
  background: var(--card);
}

/* ───────────────── MAIN ───────────────── */

main {
  max-width: 1000px;
  margin: 0 auto;
  padding: 0 24px 120px;
}

/* ───────────────── HERO ───────────────── */

.hero {
  text-align: center;
  padding: 60px 0 56px;
}

.hero-eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 7px;

  margin-bottom: 16px;

  text-transform: uppercase;
  letter-spacing: 0.6px;

  font-size: 12px;
  font-weight: 500;

  color: var(--text-tertiary);
}

.hero-eyebrow-dot {
  width: 6px;
  height: 6px;
  border-radius: 999px;

  background: #22C55E;

  animation: pulse-dot 2s infinite ease-in-out;
}

@keyframes pulse-dot {
  0%,100% {
    opacity: 1;
    transform: scale(1);
  }

  50% {
    opacity: .5;
    transform: scale(.8);
  }
}

.hero h1 {
  font-family: 'DM Serif Display', serif;

  font-size: clamp(36px, 6vw, 52px);

  line-height: 1.15;
  font-weight: 400;

  letter-spacing: -1.5px;

  margin-bottom: 20px;
}

.hero h1 em {
  color: var(--text-secondary);
}

.hero-sub {
  font-size: 17px;
  font-weight: 300;

  color: var(--text-secondary);

  max-width: 700px;
  margin: 0 auto;
}

/* ───────────────── INPUT ───────────────── */

.input-card {
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);

  overflow: hidden;

  background: var(--bg);

  box-shadow: var(--shadow-md);
}

.input-card textarea {
  width: 100%;
  min-height: 220px;

  resize: none;
  border: none;
  outline: none;

  padding: 28px 28px 20px;

  font-size: 15px;
  font-family: inherit;
  font-weight: 300;

  line-height: 1.75;
}

.input-card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;

  border-top: 1px solid var(--border);

  padding: 14px 20px 20px 28px;
}

.helper-text {
  font-size: 12px;
  color: var(--text-tertiary);
}

.analyze-btn {
  display: flex;
  align-items: center;
  gap: 8px;

  border: none;

  padding: 11px 22px;

  border-radius: var(--radius-md);

  background: var(--accent);
  color: white;

  font-size: 14px;
  font-weight: 500;

  cursor: pointer;

  transition: all var(--transition);
}

.analyze-btn:hover {
  background: var(--accent-hover);
  transform: translateY(-1px);
}

/* ───────────────── LOADING ───────────────── */

.loading-state {
  display: none;
  text-align: center;
  padding: 72px 0;
}

.loading-state.visible {
  display: block;
}

.spinner {
  width: 36px;
  height: 36px;

  margin: 0 auto 24px;

  border-radius: 50%;

  border: 2px solid var(--border);
  border-top-color: var(--text-primary);

  animation: spin .8s linear infinite;
}

@keyframes spin {
  to {
    transform: rotate(360deg);
  }
}

.loading-text {
  font-size: 15px;
  color: var(--text-secondary);
}

/* ───────────────── RESULTS ───────────────── */

.results-area {
  display: none;
  margin-top: 56px;
}

.results-area.visible {
  display: block;
  animation: fade-up .5s ease;
}

@keyframes fade-up {
  from {
    opacity: 0;
    transform: translateY(16px);
  }

  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* ───────────────── SUMMARY ───────────────── */

.summary-box {
  background: var(--card);

  border: 1px solid var(--border);

  border-radius: var(--radius-lg);

  padding: 28px 32px;

  margin-bottom: 48px;
}

.summary-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: .8px;

  margin-bottom: 12px;

  color: var(--text-tertiary);
}

.summary-text {
  font-family: 'DM Serif Display', serif;

  font-size: 20px;

  line-height: 1.5;
}

/* ───────────────── SECTION ───────────────── */

.section-header {
  display: flex;
  align-items: baseline;
  gap: 12px;

  margin-bottom: 20px;
}

.section-title {
  font-size: 13px;

  text-transform: uppercase;
  letter-spacing: .5px;

  color: var(--text-tertiary);
}

.section-divider {
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ───────────────── INSIGHTS ───────────────── */

.insights-grid {
  display: flex;
  flex-direction: column;
  gap: 8px;

  margin-bottom: 52px;
}

.insight-chip {
  display: flex;
  align-items: center;
  gap: 12px;

  padding: 14px 18px;

  background: var(--card);

  border: 1px solid var(--border);

  border-radius: var(--radius-md);
}

.insight-rank {
  width: 18px;
  flex-shrink: 0;

  font-size: 11px;
  color: var(--text-tertiary);
}

.insight-name {
  flex: 1;
}

.insight-count {
  font-size: 12px;

  padding: 3px 9px;

  border-radius: 20px;

  border: 1px solid var(--border);

  background: white;

  color: var(--text-tertiary);
}

/* ───────────────── CLUSTERS ───────────────── */

.clusters-list {
  width: min(1050px, calc(100vw - 80px));

  margin-left: 50%;
  transform: translateX(-50%);

  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));

  gap: 28px;

  margin-bottom: 52px;
}

.cluster-card {
  border: 1px solid var(--border);

  border-radius: var(--radius-lg);

  background: var(--bg);

  padding: 28px 30px;

  box-shadow: var(--shadow-xs);

  height: 100%;
}

.cluster-card-header {
  display: flex;
  justify-content: space-between;
  gap: 16px;

  margin-bottom: 20px;
}

.cluster-title {
  font-size: 17px;
  font-weight: 500;
}

.mention-badge {
  font-size: 11px;

  padding: 4px 10px;

  border-radius: 999px;

  background: var(--card);

  border: 1px solid var(--border);

  white-space: nowrap;
}

.cluster-quotes {
  list-style: none;

  display: flex;
  flex-direction: column;
  gap: 10px;
}

.cluster-quotes li {
  display: flex;
  gap: 12px;

  padding: 10px 14px;

  background: var(--card);

  border-radius: var(--radius-sm);

  font-size: 14px;
  color: var(--text-secondary);
}

.quote-mark {
  color: #cccccc;
  font-size: 22px;
  line-height: 1;
}

/* ───────────────── RESET ───────────────── */

.reset-row {
  text-align: center;
}

.reset-btn {
  border: none;
  background: transparent;

  color: var(--text-tertiary);

  cursor: pointer;
}

/* ───────────────── FOOTER ───────────────── */

footer {
  text-align: center;

  padding: 40px 24px;

  border-top: 1px solid var(--border);
}

.footer-text {
  font-size: 12px;
  color: var(--text-tertiary);
}

/* ───────────────── RESPONSIVE ───────────────── */

@media (max-width: 1000px) {

  .clusters-list {
    grid-template-columns: repeat(2, 1fr);
  }

}

@media (max-width: 700px) {

  nav {
    padding: 0 20px;
  }

  main {
    padding: 0 16px 80px;
  }

  .clusters-list {
    width: 100%;

    margin-left: 0;
    transform: none;

    grid-template-columns: 1fr;
  }

  .input-card-footer {
    flex-direction: column;
    align-items: flex-end;
    gap: 12px;
  }

  .helper-text {
    align-self: flex-start;
  }

}

</style>
</head>

<body>

<nav>
  <a href="#" class="nav-brand">
    Feedback MVP<span>.</span>
  </a>

  <button class="nav-example-btn" id="exampleBtn">
    Example Input
  </button>
</nav>

<main>

<section class="hero">

  <div class="hero-eyebrow">
    <span class="hero-eyebrow-dot"></span>
    AI-powered feedback analysis
  </div>

  <h1>
    Find repeated user pain <em>instantly</em>
  </h1>

  <p class="hero-sub">
    Paste scattered feedback and instantly understand what users actually care about.
  </p>

</section>

<section class="input-section">

  <div class="input-card">

    <textarea
      id="feedbackInput"
      placeholder="Paste Reddit comments, support chats, tweets, interview notes, or any user feedback here…"
      spellcheck="false"
    ></textarea>

    <div class="input-card-footer">

      <span class="helper-text">
        Separate feedback entries with new lines.
      </span>

      <button class="analyze-btn" id="analyzeBtn">

        Analyze Feedback

        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path
            d="M2 7h10M8 3l4 4-4 4"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>

      </button>

    </div>

  </div>

</section>

<section class="loading-state" id="loadingState">

  <div class="spinner"></div>

  <p class="loading-text" id="loadingText">
    Analyzing repeated feedback patterns...
  </p>

</section>

<section class="results-area" id="resultsArea"></section>

</main>

<footer>
  <p class="footer-text">
    Feedback MVP — Turn chaos into clarity.
  </p>
</footer>

<script>

const API_URL = 'https://web-production-ec052.up.railway.app/analyze';

const EXAMPLE_INPUT = `
The signup flow is really confusing.
Onboarding took way too long.
I gave up during setup.
The dashboard feels overwhelming.
Too many buttons everywhere.
App is slow on iPhone.
Crashes on iOS 17.
Need dark mode.
Please add CSV export.
`;

const exampleBtn = document.getElementById('exampleBtn');
const analyzeBtn = document.getElementById('analyzeBtn');

const feedbackInput = document.getElementById('feedbackInput');

const loadingState = document.getElementById('loadingState');

const resultsArea = document.getElementById('resultsArea');

const loadingText = document.getElementById('loadingText');

const loadingMessages = [
  'Analyzing repeated feedback patterns...',
  'Grouping similar user complaints...',
  'Finding common user pain points...',
  'Structuring your insights...',
];

exampleBtn.addEventListener('click', () => {

  feedbackInput.value = EXAMPLE_INPUT;

  feedbackInput.style.height = 'auto';

  feedbackInput.style.height =
    feedbackInput.scrollHeight + 'px';

});

feedbackInput.addEventListener('input', () => {

  feedbackInput.style.height = 'auto';

  feedbackInput.style.height =
    Math.min(feedbackInput.scrollHeight, 400) + 'px';

});

analyzeBtn.addEventListener('click', () => {

  const val = feedbackInput.value.trim();

  if (!val) {

    feedbackInput.focus();

    return;
  }

  startAnalysis();

});

async function startAnalysis() {

  resultsArea.classList.remove('visible');
  resultsArea.innerHTML = '';

  loadingState.classList.add('visible');

  analyzeBtn.disabled = true;
  analyzeBtn.style.opacity = '.5';

  let msgIdx = 0;

  const msgInterval = setInterval(() => {

    msgIdx = (msgIdx + 1) % loadingMessages.length;

    loadingText.innerHTML = loadingMessages[msgIdx];

  }, 1400);

  try {

    const response = await fetch(API_URL, {

      method: 'POST',

      headers: {
        'Content-Type': 'application/json'
      },

      body: JSON.stringify({
        feedback: feedbackInput.value
      })

    });

    const data = await response.json();

    clearInterval(msgInterval);

    loadingState.classList.remove('visible');

    analyzeBtn.disabled = false;
    analyzeBtn.style.opacity = '1';

    if (data.error) {
      alert(data.error);
      return;
    }

    showResults(data);

  } catch (error) {

    clearInterval(msgInterval);

    loadingState.classList.remove('visible');

    analyzeBtn.disabled = false;
    analyzeBtn.style.opacity = '1';

    console.error(error);

    alert('Failed to analyze feedback');

  }

}

function showResults(data) {

  let html = '';

  html += `
    <div class="summary-box">

      <div class="summary-label">
        Summary
      </div>

      <p class="summary-text">
        "${data.summary}"
      </p>

    </div>
  `;

  html += `
    <div class="section-header">

      <span class="section-title">
        Most Repeated Problems
      </span>

      <div class="section-divider"></div>

    </div>

    <div class="insights-grid">

      ${data.insights.map((ins, i) => `

        <div class="insight-chip">

          <span class="insight-rank">
            ${String(i + 1).padStart(2, '0')}
          </span>

          <span class="insight-name">
            ${ins.name}
          </span>

          <span class="insight-count">
            ${ins.count}
          </span>

        </div>

      `).join('')}

    </div>
  `;

  html += `
    <div class="section-header">

      <span class="section-title">
        Feedback Clusters
      </span>

      <div class="section-divider"></div>

    </div>

    <div class="clusters-list">

      ${data.clusters.map(cluster => `

        <div class="cluster-card">

          <div class="cluster-card-header">

            <h3 class="cluster-title">
              ${cluster.title}
            </h3>

            <span class="mention-badge">
              ${cluster.count}
            </span>

          </div>

          <ul class="cluster-quotes">

            ${cluster.quotes.map(q => `

              <li>

                <span class="quote-mark">
                  "
                </span>

                <span>
                  ${q}
                </span>

              </li>

            `).join('')}

          </ul>

        </div>

      `).join('')}

    </div>
  `;

  html += `
    <div class="reset-row">

      <button class="reset-btn" id="resetBtn">

        ← Analyze new feedback

      </button>

    </div>
  `;

  resultsArea.innerHTML = html;

  resultsArea.classList.add('visible');

  setTimeout(() => {

    resultsArea.scrollIntoView({
      behavior: 'smooth',
      block: 'start'
    });

  }, 100);

  document
    .getElementById('resetBtn')
    .addEventListener('click', () => {

      feedbackInput.value = '';

      feedbackInput.style.height = '';

      resultsArea.classList.remove('visible');

      setTimeout(() => {
        resultsArea.innerHTML = '';
      }, 300);

      window.scrollTo({
        top: 0,
        behavior: 'smooth'
      });

    });

}

</script>

</body>
</html>
